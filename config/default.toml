[server]
host = "0.0.0.0"
port = 8080
shutdown_timeout_secs = 30
request_timeout_secs = 600

[server.rate_limit]
enabled = true
requests_per_second = 10
burst_size = 20

[database]
url = ""
max_connections = 5

[auth]
enabled = false
jwt_secret = "dev-secret-change-me"
token_expiry_hours = 24

[providers.llm]
kind = "ollama"
model = "llama3.2"
base_url = "http://localhost:11435"
api_key = ""

[providers.embedding]
kind = "fastembed"
model = "BAAI/bge-small-en-v1.5"
dimension = 384

[providers.vector_store]
kind = "in_memory"
url = ""
collection = "thairag_chunks"

[providers.text_search]
kind = "tantivy"
index_path = "./data/tantivy_index"

[providers.reranker]
kind = "passthrough"
model = ""
api_key = ""

[search]
top_k = 10
rerank_top_k = 5
rrf_k = 60
vector_weight = 0.6
text_weight = 0.4

[document]
max_chunk_size = 512
chunk_overlap = 64
language_aware_chunking = true
image_description_enabled = false    # requires vision-capable LLM
table_extraction_enabled = true

[chat_pipeline]
# live_retrieval_enabled = false
# live_retrieval_timeout_secs = 15
# live_retrieval_max_connectors = 3
# live_retrieval_max_content_chars = 30000

# Conversation auto-summarization: compacts long sessions to manage context window
auto_summarize = true
summarize_threshold = 20       # message count before auto-summarize triggers
summarize_keep_recent = 6      # recent messages kept intact after summarization

[session]
backend = "memory"          # "memory" or "redis"
max_history = 50
stale_timeout_secs = 3600

[embedding_cache]
backend = "memory"          # "memory", "redis", or "none"
max_entries = 10000
ttl_secs = 3600

[job_queue]
backend = "memory"
retention_secs = 86400          # 24 hours

[redis]
url = "redis://127.0.0.1:6379"

[otel]
enabled = false
endpoint = "http://localhost:4317"
service_name = "thairag"

[knowledge_graph]
enabled = false
extract_on_ingest = false

[plugins]
# List of plugin names to enable by default. Empty = all built-in plugins enabled.
# enabled_plugins = ["metadata-strip", "query-expansion", "summary-chunk"]

[mcp]
enabled = false
max_concurrent_syncs = 3
connect_timeout_secs = 30
read_timeout_secs = 120
summarize_on_sync = false
max_resource_size_bytes = 52428800
sync_retry_max_attempts = 3
sync_retry_base_delay_secs = 2
sync_retry_max_delay_secs = 60


[search_analytics]
enabled = true
retention_days = 90

[personal_memory]
enabled = true
max_per_user = 100
relevance_decay = 0.95

[multi_tenancy]
enabled = false
default_plan = "free"

[search_quality]
regression_threshold = 0.05

[embedding_finetune]
enabled = false
output_dir = "./data/finetuned_models"
