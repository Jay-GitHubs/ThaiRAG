[server]
host = "0.0.0.0"
port = 8080
shutdown_timeout_secs = 30

[server.rate_limit]
enabled = true
requests_per_second = 10
burst_size = 20

[database]
url = ""
max_connections = 5

[auth]
enabled = false
jwt_secret = "dev-secret-change-me"
token_expiry_hours = 24

[providers.llm]
kind = "ollama"
model = "llama3.2"
base_url = "http://localhost:11434"
api_key = ""

[providers.embedding]
kind = "fastembed"
model = "BAAI/bge-small-en-v1.5"
dimension = 384

[providers.vector_store]
kind = "in_memory"
url = ""
collection = "thairag_chunks"

[providers.text_search]
kind = "tantivy"
index_path = "./data/tantivy_index"

[providers.reranker]
kind = "passthrough"
model = ""
api_key = ""

[search]
top_k = 10
rerank_top_k = 5
rrf_k = 60
vector_weight = 0.6
text_weight = 0.4

[document]
max_chunk_size = 512
chunk_overlap = 64

[mcp]
enabled = false
max_concurrent_syncs = 3
connect_timeout_secs = 30
read_timeout_secs = 120
summarize_on_sync = false
max_resource_size_bytes = 52428800
sync_retry_max_attempts = 3
sync_retry_base_delay_secs = 2
sync_retry_max_delay_secs = 60
