# Standard tier: Claude + OpenAI embeddings + Qdrant + Cohere reranker
[database]
url = "postgresql://thairag:thairag@localhost:5432/thairag"
max_connections = 10

[providers.llm]
kind = "claude"
model = "claude-sonnet-4-20250514"
api_key = ""

[providers.embedding]
kind = "openai"
model = "text-embedding-3-small"
dimension = 1536
api_key = ""

[providers.vector_store]
kind = "qdrant"
url = "http://localhost:6334"
collection = "thairag_chunks"

[providers.text_search]
kind = "tantivy"

[providers.reranker]
kind = "cohere"
model = "rerank-v3.0"
api_key = ""
