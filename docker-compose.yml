services:
  # ── PostgreSQL ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── ThaiRAG API ──────────────────────────────────────────────────────
  thairag:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - thairag-data:/data
    env_file: .env
    environment:
      THAIRAG__SERVER__HOST: "0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Admin UI ────────────────────────────────────────────────────────
  admin-ui:
    build: ./admin-ui
    ports:
      - "8081:80"
    depends_on:
      - thairag

  # ── Qdrant (vector database, free & open-source) ───────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  # ── Ollama (local LLM for free tier) ───────────────────────────────
