services:
  # ── PostgreSQL ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (session store, embedding cache) ──────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── ThaiRAG API ──────────────────────────────────────────────────────
  thairag:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - thairag-data:/data
    env_file: .env
    environment:
      THAIRAG__SERVER__HOST: "0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── PaddleOCR sidecar (deterministic Thai OCR tier-2) ───────────────
  # Opt-in: only starts with `docker compose --profile ocr up`. To use it,
  # also set THAIRAG__DOCUMENT__OCR_SIDECAR_URL=http://paddleocr:8086 on the
  # thairag service (env/.env) so OCR-needing PDF pages prefer it over the VLM.
  paddleocr:
    build: ./services/paddleocr-sidecar
    profiles: ["ocr"]
    ports:
      - "8086:8086"

  # ── Admin UI ────────────────────────────────────────────────────────
  admin-ui:
    build: ./admin-ui
    ports:
      - "8081:80"
    depends_on:
      - thairag

  # ── Chat UI (first-party end-user chat frontend) ───────────────────
  chat-ui:
    build: ./chat-ui
    ports:
      - "8082:80"
    depends_on:
      - thairag

  # ── Qdrant (vector database, free & open-source) ───────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  # ── Prometheus (metrics collection) ────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - thairag

  # ── Grafana (dashboards) ──────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # ── Ollama (local LLM for free tier) ───────────────────────────────
  #ollama:
  #  image: ollama/ollama:latest
  #  ports:
  #    - "11435:11435"
  #  volumes:
  #    - ollama-models:/root/.ollama

volumes:
  postgres-data:
  thairag-data:
  redis-data:
  qdrant-data:
  prometheus-data:
  grafana-data:
  ollama-models:
