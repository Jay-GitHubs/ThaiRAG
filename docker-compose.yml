services:
  # ── Nightly backup sidecar ───────────────────────────────────────────
  # Scheduled INSIDE the stack because macOS TCC blocks host cron's access
  # to /Volumes even with a granted Full Disk Access entry (lived failure,
  # 2026-07-13). Docker's daemon already has authorized volume access, so
  # this survives macOS updates. `docker exec thairag-backup-1 bash
  # /backup-loop.sh once` runs an immediate backup for testing.
  backup:
    build:
      context: .
      dockerfile: ops/backup.Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
      - qdrant
    environment:
      TZ: ${TZ:-Asia/Bangkok}
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      BACKUP_AT: "03:30"
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-thairag_chunks}
    volumes:
      - ./backups:/backups

  # ── PostgreSQL ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (session store, embedding cache) ──────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── ThaiRAG API ──────────────────────────────────────────────────────
  thairag:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - thairag-data:/data
    env_file: .env
    environment:
      THAIRAG__SERVER__HOST: "0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── PaddleOCR sidecar (deterministic Thai OCR tier-2) ───────────────
  # Opt-in: only starts with `docker compose --profile ocr up`. To use it,
  # also set THAIRAG__DOCUMENT__OCR_SIDECAR_URL=http://paddleocr:8086 on the
  # thairag service (env/.env) so OCR-needing PDF pages prefer it over the VLM.
  paddleocr:
    build: ./services/paddleocr-sidecar
    profiles: ["ocr"]
    ports:
      - "8086:8086"

  # ── Admin UI ────────────────────────────────────────────────────────
  admin-ui:
    build: ./admin-ui
    ports:
      - "8081:80"
    depends_on:
      - thairag

  # ── Chat UI (first-party end-user chat frontend) ───────────────────
  chat-ui:
    build: ./chat-ui
    ports:
      - "8082:80"
    depends_on:
      - thairag

  # ── Qdrant (vector database, free & open-source) ───────────────────
  qdrant:
    image: qdrant/qdrant:v1.17.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  # ── Prometheus (metrics collection) ────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.10.0
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - thairag

  # ── Grafana (dashboards) ──────────────────────────────────────────
  grafana:
    image: grafana/grafana:12.4.2
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres-data:
  thairag-data:
  redis-data:
  qdrant-data:
  prometheus-data:
  grafana-data:
