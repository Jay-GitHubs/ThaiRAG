  #open-webui:
  #  image: ghcr.io/open-webui/open-webui:main
  #  ports:
  #    - "3000:8080"
  #  volumes:
  #    - open-webui-data:/app/backend/data
  #  environment:
  #    OPENAI_API_BASE_URLS: "http://thairag:8080/v1"
  #    OPENAI_API_KEYS: "unused"
  #    # ── OIDC SSO ──────────────────────────────────────────
  #    ENABLE_OAUTH_SIGNUP: "true"
  #    OAUTH_PROVIDER_NAME: "SSO"
