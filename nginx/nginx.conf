worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # ── Logging ──────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Rate Limiting ────────────────────────────────────────────────────
    # 10 requests/sec per IP with burst of 20.
    # Adjust zone size (10m ~ 160k IPs) and rate as needed.
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # ── Upstream: ThaiRAG instances ──────────────────────────────────────
    # Docker Compose DNS resolves "thairag" to all replica IPs.
    # ip_hash ensures the same client always hits the same instance,
    # which is required for SSE streaming and session affinity.
    upstream thairag_backend {
        ip_hash;
        server thairag:8080;
    }

    server {
        listen 80;
        server_name _;

        # ── TLS termination (uncomment and adjust for production) ────────
        # To enable TLS:
        # 1. Mount your certificate and key into the container
        #    (e.g., via volumes in docker-compose.scale.yml)
        # 2. Uncomment the block below and change "listen 80" to "listen 443 ssl"
        # 3. Optionally add an HTTP-to-HTTPS redirect server block
        #
        # listen 443 ssl;
        # ssl_certificate     /etc/nginx/certs/fullchain.pem;
        # ssl_certificate_key /etc/nginx/certs/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         HIGH:!aNULL:!MD5;
        # ssl_prefer_server_ciphers on;
        #
        # # HTTP -> HTTPS redirect (add as a separate server block):
        # # server {
        # #     listen 80;
        # #     return 301 https://$host$request_uri;
        # # }

        # ── Health check endpoint (no rate limit) ────────────────────────
        location /health {
            proxy_pass http://thairag_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Metrics endpoint (restrict to internal networks) ─────────────
        location /metrics {
            # Allow Prometheus scraping from the Docker network.
            # Adjust or remove these rules based on your network topology.
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://thairag_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── SSE streaming for chat completions ───────────────────────────
        location /v1/chat/completions {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://thairag_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE support: disable buffering so tokens stream immediately
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;

            # Long timeout for streaming responses (matches server request_timeout)
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # ── All other API routes ─────────────────────────────────────────
        location / {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://thairag_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket upgrade support (for future use)
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 300s;
        }
    }

    # ── WebSocket upgrade map ────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
}
