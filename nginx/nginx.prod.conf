# ── Production Nginx Configuration ───────────────────────────────────────────
# TLS termination, reverse proxy to ThaiRAG API, static admin-UI serving.
# Certs are mounted at /etc/nginx/certs/{fullchain.pem,privkey.pem}.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr rt=$request_time '
                    'uct=$upstream_connect_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main buffer=16k flush=5s;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;

    # ── Request size limit (matches document upload max: 50 MB) ──────────────
    client_max_body_size 50M;
    client_body_timeout  60s;
    client_header_timeout 15s;
    send_timeout         60s;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   4;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        application/javascript
        application/json
        application/x-javascript
        application/xml
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # General API: 10 req/s per IP, burst 30
    limit_req_zone $binary_remote_addr zone=api:10m    rate=10r/s;
    # Auth endpoints: tighter — 5 req/s per IP, burst 10
    limit_req_zone $binary_remote_addr zone=auth:10m   rate=5r/s;
    # Document upload: 2 req/s per IP (large payloads)
    limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;
    limit_req_status 429;

    # ── WebSocket upgrade map ─────────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Upstream: ThaiRAG API ─────────────────────────────────────────────────
    # ip_hash ensures SSE streaming and session affinity with multiple replicas.
    upstream thairag_backend {
        ip_hash;
        server thairag:8080;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # ACME challenge passthrough (for Let's Encrypt certbot webroot mode)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        # ── TLS ───────────────────────────────────────────────────────────────
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Modern TLS — TLSv1.2 minimum, prefer TLSv1.3
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        # Session caching and OCSP stapling
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"                  always;
        add_header X-Frame-Options           "DENY"                     always;
        add_header X-XSS-Protection          "1; mode=block"            always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        # CSP: allow API calls to self; no inline scripts (admin-ui uses bundled JS)
        add_header Content-Security-Policy
            "default-src 'self'; \
             script-src 'self' 'unsafe-inline'; \
             style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
             font-src 'self' https://fonts.gstatic.com data:; \
             img-src 'self' data: blob:; \
             connect-src 'self' wss:; \
             frame-ancestors 'none';" always;

        # ── /admin — serve admin-UI static files ──────────────────────────────
        location /admin/ {
            alias /usr/share/nginx/html/admin/;
            index index.html;
            try_files $uri $uri/ /admin/index.html;

            # Long-lived cache for hashed assets
            location ~* /admin/.+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }

            # No cache for index.html (SPA entry point)
            location = /admin/index.html {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
            }
        }

        # ── /grafana — Grafana dashboards (internal only) ─────────────────────
        location /grafana/ {
            # Restrict to RFC1918 addresses — adjust if behind a load balancer
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://grafana:3000/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── /health — health check (no rate limit, no auth) ───────────────────
        location = /health {
            proxy_pass http://thairag_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 10s;
        }

        # ── /metrics — Prometheus scrape endpoint (internal networks only) ─────
        location = /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://thairag_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── /ws/chat — WebSocket chat endpoint ───────────────────────────────
        location /ws/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://thairag_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
            proxy_buffering     off;
        }

        # ── /v1/chat/completions — SSE streaming ─────────────────────────────
        location = /v1/chat/completions {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://thairag_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE: disable buffering so tokens arrive immediately
            proxy_buffering            off;
            proxy_cache                off;
            chunked_transfer_encoding  on;
            add_header X-Accel-Buffering no;

            # Long timeout for streaming LLM responses
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # ── /api/km/.../test-query-stream — admin-UI SSE stream ──────────────
        location ~ ^/api/km/workspaces/[^/]+/test-query-stream$ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://thairag_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        '';
            proxy_http_version 1.1;
            proxy_buffering   off;
            proxy_cache       off;
            chunked_transfer_encoding off;
            proxy_read_timeout 300s;
            add_header X-Accel-Buffering no;
        }

        # ── /api/km/.../documents — document upload (larger limit, lower rate) -
        location ~ ^/api/km/ {
            # Apply tighter rate limit for document upload paths
            limit_req zone=upload burst=5 nodelay;

            proxy_pass http://thairag_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 50M;
            proxy_read_timeout   300s;
            proxy_send_timeout   300s;
        }

        # ── Auth endpoints — tighter rate limit ───────────────────────────────
        location ~ ^/api/(auth|login|register) {
            limit_req zone=auth burst=10 nodelay;

            proxy_pass http://thairag_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── /v1/, /v2/, /api/ — all other API routes ─────────────────────────
        location ~ ^/(v1|v2|api)/ {
            limit_req zone=api burst=30 nodelay;

            proxy_pass http://thairag_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            proxy_read_timeout 300s;
            proxy_send_timeout 60s;

            # Upstream keepalive
            proxy_set_header Connection "";
        }

        # ── Default: redirect bare root to admin UI ───────────────────────────
        location = / {
            return 301 /admin/;
        }

        # Block access to hidden files
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
