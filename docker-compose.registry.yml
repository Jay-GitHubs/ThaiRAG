# Pre-built images from GitHub Container Registry / Docker Hub.
#
# Use this file to run ThaiRAG without cloning the repository.
#
# Quick start:
#   1. Copy this file and .env.example to an empty directory
#   2. cp .env.example .env  (edit with your settings)
#   3. docker compose -f docker-compose.registry.yml up -d
#
# Images (API, admin console, first-party chat UI, OCR sidecar):
#   GHCR:       ghcr.io/jay-githubs/{thairag,thairag-admin,thairag-chat,thairag-paddleocr}
#   Docker Hub: jdevspecialist/{thairag,thairag-admin,thairag-chat,thairag-paddleocr}
#
# To use Docker Hub instead of GHCR, set in .env:
#   THAIRAG_IMAGE=jdevspecialist/thairag
#   THAIRAG_ADMIN_IMAGE=jdevspecialist/thairag-admin
#   THAIRAG_CHAT_IMAGE=jdevspecialist/thairag-chat
#   THAIRAG_OCR_IMAGE=jdevspecialist/thairag-paddleocr
#
# Deterministic Thai OCR is opt-in via the `ocr` Compose profile:
#   docker compose -f docker-compose.registry.yml --profile ocr up -d
# and set THAIRAG__DOCUMENT__OCR_SIDECAR_URL=http://paddleocr:8086 in .env.
#
# The thairag service loads `.env` via env_file, so any THAIRAG__… key you set
# in .env (provider base URLs, models, document/OCR options, …) is applied —
# not just the few interpolated below. The interpolated ones are required
# secrets or values constructed from other vars.

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-thairag}
      POSTGRES_USER: ${POSTGRES_USER:-thairag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-thairag}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Qdrant (vector database) ─────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.17.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  # ── ThaiRAG API ──────────────────────────────────────────────────────
  thairag:
    image: ${THAIRAG_IMAGE:-ghcr.io/jay-githubs/thairag}:${THAIRAG_TAG:-latest}
    ports:
      - "8080:8080"
    volumes:
      - thairag-data:/data
    # Load the full .env so every THAIRAG__… key you set there is applied
    # (provider base URLs/models, document & OCR options, etc.). The explicit
    # `environment:` block below overrides specific keys: required secrets and
    # values constructed from other vars (DB URL, in-cluster Qdrant URL).
    env_file: .env
    environment:
      THAIRAG__SERVER__HOST: "0.0.0.0"
      THAIRAG_TIER: ${THAIRAG_TIER:-standard}
      THAIRAG__AUTH__ENABLED: ${THAIRAG__AUTH__ENABLED:-true}
      THAIRAG__AUTH__JWT_SECRET: ${THAIRAG__AUTH__JWT_SECRET:?Set THAIRAG__AUTH__JWT_SECRET in .env}
      THAIRAG__DATABASE__URL: postgresql://${POSTGRES_USER:-thairag}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-thairag}
      THAIRAG__PROVIDERS__LLM__API_KEY: ${THAIRAG__PROVIDERS__LLM__API_KEY:-}
      THAIRAG__PROVIDERS__EMBEDDING__API_KEY: ${THAIRAG__PROVIDERS__EMBEDDING__API_KEY:-}
      THAIRAG__PROVIDERS__RERANKER__API_KEY: ${THAIRAG__PROVIDERS__RERANKER__API_KEY:-}
      THAIRAG__PROVIDERS__VECTOR_STORE__URL: http://qdrant:6334
      THAIRAG__ADMIN__EMAIL: ${THAIRAG__ADMIN__EMAIL:-}
      THAIRAG__ADMIN__PASSWORD: ${THAIRAG__ADMIN__PASSWORD:-}
      THAIRAG__AUTH__API_KEYS: ${THAIRAG__AUTH__API_KEYS:-}
      THAIRAG__SERVER__CORS_ORIGINS: ${THAIRAG__SERVER__CORS_ORIGINS:-http://localhost:8081,http://localhost:8082}
    depends_on:
      postgres:
        condition: service_healthy

  # ── PaddleOCR sidecar (deterministic Thai OCR tier-2) ────────────────
  # Opt-in: only starts with the `ocr` profile —
  #   docker compose -f docker-compose.registry.yml --profile ocr up -d
  # Then set THAIRAG__DOCUMENT__OCR_SIDECAR_URL=http://paddleocr:8086 in .env so
  # OCR-needing PDF pages prefer it (local, deterministic) over the vision LLM.
  paddleocr:
    image: ${THAIRAG_OCR_IMAGE:-ghcr.io/jay-githubs/thairag-paddleocr}:${THAIRAG_TAG:-latest}
    profiles: ["ocr"]
    ports:
      - "8086:8086"

  # ── Admin UI ─────────────────────────────────────────────────────────
  admin-ui:
    image: ${THAIRAG_ADMIN_IMAGE:-ghcr.io/jay-githubs/thairag-admin}:${THAIRAG_TAG:-latest}
    ports:
      - "8081:80"
    depends_on:
      - thairag

  # ── Chat UI (first-party end-user chat) ──────────────────────────────
  # Nginx proxies /api and /v1 to the `thairag` service in-cluster. Add its
  # public origin to THAIRAG__SERVER__CORS_ORIGINS in .env.
  chat-ui:
    image: ${THAIRAG_CHAT_IMAGE:-ghcr.io/jay-githubs/thairag-chat}:${THAIRAG_TAG:-latest}
    ports:
      - "8082:80"
    depends_on:
      - thairag

volumes:
  postgres-data:
  thairag-data:
  qdrant-data:
