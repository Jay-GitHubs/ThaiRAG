<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ThaiRAG Admin{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-indigo-600 text-white px-6 py-3 flex items-center justify-between">
        <h1 class="text-xl font-bold">ThaiRAG Admin</h1>
        <div class="flex gap-4">
            <a href="/admin" class="hover:underline">Dashboard</a>
            <a href="/admin/orgs" class="hover:underline">Organizations</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-6 px-4">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
