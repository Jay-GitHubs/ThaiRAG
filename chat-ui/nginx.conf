server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }

    # ES module assets (e.g. the PDF.js worker). nginx's default mime.types
    # serves .mjs as application/octet-stream, which browsers refuse to load as a
    # module worker — PDF.js then falls back to slow main-thread rendering. Force
    # a JavaScript content type so the real worker loads.
    location ~* \.mjs$ {
        default_type text/javascript;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cache for index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # First-party streaming chat — disable buffering so SSE tokens flush in
    # real-time instead of being held by the proxy.
    location ~ /api/chat/conversations/.*/messages$ {
        proxy_pass http://thairag:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
        add_header X-Accel-Buffering no;
    }

    # Proxy API calls to backend
    location /api/ {
        proxy_pass http://thairag:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /v1/ {
        proxy_pass http://thairag:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
        proxy_pass http://thairag:8080;
        proxy_set_header Host $host;
    }
}
