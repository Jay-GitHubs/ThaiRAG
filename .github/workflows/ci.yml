name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

# When a new commit pushes to a branch, cancel any in-flight run on the
# same branch. Prevents the single self-hosted Mac Studio runner from
# queueing up stale jobs from superseded commits — that queue blocks the
# latest commit's tests until the older job finishes (often 10+ minutes
# of wasted Mac CPU on code we don't care about anymore).
#
# Group key includes `github.ref` so different branches (main vs PR
# branches) don't cancel each other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Rust: parallel jobs (fmt / clippy / test / cli build). ──
  #
  # `runs-on` routes by trust level:
  # - `push` to main (already-reviewed code) → `mac-studio` self-hosted.
  # - `pull_request` from OWNER (the repo owner authoring their own PRs)
  #   → `mac-studio`. The owner already has merge rights; running their
  #   PR code on their own Mac adds no new attack surface and gives them
  #   the same fast warm-cache builds as main pushes.
  # - `pull_request` from anyone else (MEMBER, COLLABORATOR, CONTRIBUTOR,
  #   external) → `ubuntu-latest`. Belt-and-suspenders with the repo
  #   setting "Require approval for first-time contributors". External
  #   PRs must NEVER pick up the self-hosted runner — anyone can edit
  #   .github/workflows/*.yml in a PR, and that would run as the runner
  #   user with access to its shell, SSH keys, persistent target/, etc.
  #
  # Mac Studio prerequisites (rust 1.95, cargo-nextest, poppler) are
  # installed once on the host — see OPERATOR_GUIDE §4.6.
  #
  # Linux-only setup steps are gated with `if: runner.os == 'Linux'`.

  fmt:
    name: Rust fmt
    runs-on: ${{ (github.event_name == 'push' || github.event.pull_request.author_association == 'OWNER') && 'mac-studio' || 'ubuntu-latest' }}
    steps:
      # `clean: false` preserves the runner's `target/` directory between
      # jobs. Default `clean: true` runs `git clean -ffdx` which removes
      # untracked files INCLUDING gitignored ones (the `-x` flag) — that
      # wipes `target/` and forces every job on the self-hosted Mac to
      # cold-compile from scratch. On ephemeral ubuntu-latest runners
      # this setting is a no-op (nothing to preserve).
      - uses: actions/checkout@v4
        with:
          clean: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Rust clippy
    runs-on: ${{ (github.event_name == 'push' || github.event.pull_request.author_association == 'OWNER') && 'mac-studio' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
          components: clippy
      # rust-cache only helps GitHub-hosted runners — on self-hosted, the
      # native `target/` directory persists across runs.
      - uses: Swatinem/rust-cache@v2
        if: runner.environment == 'github-hosted'
        with:
          shared-key: "rust-${{ runner.os }}"
      # poppler-utils provides pdftoppm for PDF vision-fallback tests.
      # On the self-hosted Mac, install via `brew install poppler` once.
      - name: Install poppler-utils (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends poppler-utils
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Rust tests
    runs-on: ${{ (github.event_name == 'push' || github.event.pull_request.author_association == 'OWNER') && 'mac-studio' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@v2
        if: runner.environment == 'github-hosted'
        with:
          shared-key: "rust-${{ runner.os }}"
      - name: Install poppler-utils (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends poppler-utils
      # cargo-nextest: 2-3× faster than `cargo test` in CI. taiki-e/install-action
      # is idempotent — on the self-hosted runner where nextest is pre-installed
      # via `cargo install cargo-nextest`, it detects the existing binary and
      # skips the download.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Run tests (nextest)
        run: cargo nextest run --workspace --no-fail-fast
      - name: Run doctests
        run: cargo test --workspace --doc

  build-cli:
    name: Rust CLI build
    runs-on: ${{ (github.event_name == 'push' || github.event.pull_request.author_association == 'OWNER') && 'mac-studio' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@v2
        if: runner.environment == 'github-hosted'
        with:
          shared-key: "rust-${{ runner.os }}"
      - run: cargo build -p thairag-cli

  admin-ui:
    name: Admin UI Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin-ui/package-lock.json

      - name: Install dependencies
        run: cd admin-ui && npm ci

      - name: Build
        run: cd admin-ui && npm run build

  typescript-sdk:
    name: TypeScript SDK Type-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json

      - name: Install dependencies
        run: cd sdks/typescript && npm install

      - name: Type-check
        run: cd sdks/typescript && npx tsc --noEmit

  python-sdk:
    name: Python SDK Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SDK
        run: cd sdks/python && pip install -e .

      - name: Import check
        run: python -c "from thairag import ThaiRAGClient; print('ThaiRAGClient import OK')"

  # ── PRs: build amd64 only to avoid QEMU emulation (5-15× slower than native). ──
  # ── ARM coverage is still validated on every push to main below. ──
  docker-build:
    name: Docker Build (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, build-cli, admin-ui, typescript-sdk, python-sdk]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images (amd64 only — PR validation)
        run: docker compose build
      # Building proves the image compiles; booting proves it RUNS. Free tier
      # is fully in-memory (empty database url -> MemoryKmStore), so the image
      # starts standalone with no postgres/redis/qdrant and /health must go ok.
      - name: Boot smoke test (free tier, in-memory)
        run: |
          docker build -q -t thairag-ci . # cache-hit retag of the compose build
          docker run -d --name thairag-smoke -p 18080:8080 \
            -e THAIRAG_TIER=free \
            -e THAIRAG__DATABASE__URL= \
            -e THAIRAG__AUTH__ENABLED=false \
            thairag-ci
          for i in $(seq 1 45); do
            if curl -fsS http://localhost:18080/health 2>/dev/null | grep -q '"status":"ok"'; then
              echo "image is healthy"
              docker rm -f thairag-smoke
              exit 0
            fi
            sleep 2
          done
          echo "::error::ThaiRAG image failed to become healthy within 90s"
          docker logs thairag-smoke || true
          docker rm -f thairag-smoke || true
          exit 1

  # ── On merge to main: matrix-build per platform on native runners. ──
  # ── amd64 runs on ubuntu-latest, arm64 runs on the free ubuntu-24.04-arm ──
  # ── runner (no QEMU emulation). Digests are then merged into one manifest. ──
  docker-publish-build:
    name: Build ${{ matrix.platform }} on ${{ matrix.runner }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [fmt, clippy, test, build-cli, admin-ui, typescript-sdk, python-sdk]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch_tag: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch_tag: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: jdevspecialist
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build single-platform image and push by digest to GHCR only.
      # The merge job builds the multi-arch manifest in GHCR, then
      # copies the finished manifest to Docker Hub via `imagetools create`.
      # Pushing by digest to multiple registries in one outputs: block does
      # not produce reliable digest outputs (build-push-action's
      # `digest` output corresponds to one target, not all of them) — using
      # a single canonical registry per build is the documented pattern.
      - name: Build & push API by digest (GHCR)
        id: build-api
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/jay-githubs/thairag,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=api-${{ matrix.arch_tag }}
          cache-to: type=gha,mode=max,scope=api-${{ matrix.arch_tag }}

      - name: Build & push Admin UI by digest (GHCR)
        id: build-admin
        uses: docker/build-push-action@v6
        with:
          context: ./admin-ui
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/jay-githubs/thairag-admin,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=admin-${{ matrix.arch_tag }}
          cache-to: type=gha,mode=max,scope=admin-${{ matrix.arch_tag }}

      - name: Build & push PaddleOCR sidecar by digest (GHCR)
        id: build-paddleocr
        uses: docker/build-push-action@v6
        with:
          context: ./services/paddleocr-sidecar
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/jay-githubs/thairag-paddleocr,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=paddleocr-${{ matrix.arch_tag }}
          cache-to: type=gha,mode=max,scope=paddleocr-${{ matrix.arch_tag }}

      # Persist the per-platform digests so the merge job can pick them up.
      - name: Export digests
        run: |
          mkdir -p /tmp/digests/api /tmp/digests/admin /tmp/digests/paddleocr
          echo "${{ steps.build-api.outputs.digest }}" > /tmp/digests/api/${{ matrix.arch_tag }}
          echo "${{ steps.build-admin.outputs.digest }}" > /tmp/digests/admin/${{ matrix.arch_tag }}
          echo "${{ steps.build-paddleocr.outputs.digest }}" > /tmp/digests/paddleocr/${{ matrix.arch_tag }}

      - name: Upload digests
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch_tag }}
          path: /tmp/digests/*
          retention-days: 1

  docker-publish-manifest:
    name: Merge multi-arch manifest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [docker-publish-build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: jdevspecialist
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build the multi-arch manifest in GHCR (the registry the build jobs
      # pushed to by digest), then mirror the completed manifest to Docker
      # Hub. `imagetools create --tag DEST SRC` reads the multi-arch manifest
      # at SRC and republishes it at DEST — much simpler than re-pushing
      # each per-platform digest to Docker Hub by hand.
      - name: Create API manifest (GHCR) and mirror to Docker Hub
        env:
          SHA_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Cross-registry imagetools pushes (esp. the Docker Hub mirror)
          # intermittently fail with an HTTP/2 "PROTOCOL_ERROR" mid-copy.
          # Retry with backoff so a transient blip doesn't fail the publish.
          retry() {
            for attempt in 1 2 3 4; do
              if "$@"; then return 0; fi
              echo "attempt ${attempt} failed: $* — retrying in $((attempt*10))s" >&2
              sleep $((attempt*10))
            done
            echo "giving up after 4 attempts: $*" >&2
            return 1
          }
          SHORT_SHA="${SHA_TAG:0:7}"
          API_DIGEST_AMD=$(cat /tmp/digests/api/amd64)
          API_DIGEST_ARM=$(cat /tmp/digests/api/arm64)
          GHCR="ghcr.io/jay-githubs/thairag"
          HUB="jdevspecialist/thairag"

          for TAG in latest "${SHORT_SHA}"; do
            # Build the multi-arch manifest in GHCR from the per-platform digests.
            retry docker buildx imagetools create \
              --tag "${GHCR}:${TAG}" \
              "${GHCR}@${API_DIGEST_AMD}" \
              "${GHCR}@${API_DIGEST_ARM}"
            # Mirror the just-published GHCR manifest to Docker Hub.
            retry docker buildx imagetools create \
              --tag "${HUB}:${TAG}" \
              "${GHCR}:${TAG}"
          done

      - name: Create Admin UI manifest (GHCR) and mirror to Docker Hub
        env:
          SHA_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          retry() {
            for attempt in 1 2 3 4; do
              if "$@"; then return 0; fi
              echo "attempt ${attempt} failed: $* — retrying in $((attempt*10))s" >&2
              sleep $((attempt*10))
            done
            echo "giving up after 4 attempts: $*" >&2
            return 1
          }
          SHORT_SHA="${SHA_TAG:0:7}"
          ADMIN_DIGEST_AMD=$(cat /tmp/digests/admin/amd64)
          ADMIN_DIGEST_ARM=$(cat /tmp/digests/admin/arm64)
          GHCR="ghcr.io/jay-githubs/thairag-admin"
          HUB="jdevspecialist/thairag-admin"

          for TAG in latest "${SHORT_SHA}"; do
            retry docker buildx imagetools create \
              --tag "${GHCR}:${TAG}" \
              "${GHCR}@${ADMIN_DIGEST_AMD}" \
              "${GHCR}@${ADMIN_DIGEST_ARM}"
            retry docker buildx imagetools create \
              --tag "${HUB}:${TAG}" \
              "${GHCR}:${TAG}"
          done

      - name: Create PaddleOCR manifest (GHCR) and mirror to Docker Hub
        env:
          SHA_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          retry() {
            for attempt in 1 2 3 4; do
              if "$@"; then return 0; fi
              echo "attempt ${attempt} failed: $* — retrying in $((attempt*10))s" >&2
              sleep $((attempt*10))
            done
            echo "giving up after 4 attempts: $*" >&2
            return 1
          }
          SHORT_SHA="${SHA_TAG:0:7}"
          OCR_DIGEST_AMD=$(cat /tmp/digests/paddleocr/amd64)
          OCR_DIGEST_ARM=$(cat /tmp/digests/paddleocr/arm64)
          GHCR="ghcr.io/jay-githubs/thairag-paddleocr"
          HUB="jdevspecialist/thairag-paddleocr"

          for TAG in latest "${SHORT_SHA}"; do
            retry docker buildx imagetools create \
              --tag "${GHCR}:${TAG}" \
              "${GHCR}@${OCR_DIGEST_AMD}" \
              "${GHCR}@${OCR_DIGEST_ARM}"
            retry docker buildx imagetools create \
              --tag "${HUB}:${TAG}" \
              "${GHCR}:${TAG}"
          done
