name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  admin-ui:
    name: Admin UI Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin-ui/package-lock.json

      - name: Install dependencies
        run: cd admin-ui && npm ci

      - name: Build
        run: cd admin-ui && npm run build

  # On PRs: just verify images build
  docker-build:
    name: Docker Build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [check, admin-ui]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

  # On merge to main: build and publish images
  docker-publish:
    name: Publish Docker Images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [check, admin-ui]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: jdevspecialist
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Generate tags (latest + short SHA)
      - name: Generate metadata for API image
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/thairag
            jdevspecialist/thairag
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Generate metadata for Admin UI image
        id: meta-admin
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/thairag-admin
            jdevspecialist/thairag-admin
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      # Build and push API image
      - name: Build and push ThaiRAG API
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push Admin UI image
      - name: Build and push Admin UI
        uses: docker/build-push-action@v6
        with:
          context: ./admin-ui
          push: true
          tags: ${{ steps.meta-admin.outputs.tags }}
          labels: ${{ steps.meta-admin.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
